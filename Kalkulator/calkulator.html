<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-5">Kalkulator about study</h1>
      <div class="mb-4">
        <label for="number1" class="form-label">angka yang pertama :</label>
        <input type="number" class="form-control" id="number1" />
      </div>
      <div class="mb-4">
        <label for="operator" class="form-label">operator :</label>
        <input type="text" class="form-control" id="operator" />
      </div>
      <div class="mb-4">
        <label for="number2" class="form-label">angka yang kedua :</label>
        <input
          type="number"
          class="form-control"
          id="number2"
          placeholder="+ - * /"
          maxlength="1"
        />
      </div>
      <button class="btn btn-primary" onclick="calculate()">Hitung</button>
      <p id="hasil" class="mt-3">Hasil:</p>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
