<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row text-center">
        <h1>study in the word of javascript data</h1>
      </div>
      <div class="row justify-content-center mt-3">
        <div class="col-4">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              id="nama_depan"
              placeholder="nama depan"
             aria-placeholder="nama_depan"
            />
          </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-4">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              id="nama_belakang"
              placeholder="nama belakang"
              aria-placeholder="nama_belakang"
            />
          </div>
        </div>
      </div>
      <div class="row justify-content-center mt-4">
        <button type="button" class="btn btn-primary col-2" id="button_margine">
          margine
        </button>
      </div>
      <div class="row justify-content-center mt-4">
        <span id="nama-lengkap" class="text-center">nama lengkap</span>
      </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
